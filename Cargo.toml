[workspace]
members = [
    "crates/core",
    "crates/leptix-ui",
    "crates/primitives/label",
    "crates/primitives/separator",
    "crates/primitives/accessible-icon",
    "crates/primitives/aspect-ratio",
    "crates/primitives/progress",
    "crates/primitives/toggle",
    "crates/primitives/switch",
    "crates/primitives/avatar",
    "crates/primitives/checkbox",
    "crates/primitives/collapsible",
    "crates/primitives/toggle-group",
    "crates/primitives/radio-group",
    "crates/primitives/tabs",
    "crates/primitives/accordion",
    "crates/primitives/slider",
    # Disabled: need full infrastructure port
    # "crates/primitives/menu",
]
resolver = "2"

[workspace.package]
authors = ["Rantai Dev <dev@rantai.dev>"]
edition = "2024"
license = "MIT"
repository = "https://github.com/rantai-dev/leptix"
version = "0.1.0-alpha.1"

[workspace.dependencies]
leptos = "0.8"
leptos-maybe-callback = "0.2"
leptos-node-ref = "0.2"
leptos-style = "0.2"
leptos-typed-fallback-show = "0.2"
leptos_dom = "0.8"
floating-ui-leptos = "0.6"
send_wrapper = "0.6"
serde = "1"
serde_json = "1"
web-sys = "0.3"

leptix-core = { path = "./crates/core", version = "0.1.0-alpha.1" }
leptix-label = { path = "./crates/primitives/label", version = "0.1.0-alpha.1" }
leptix-separator = { path = "./crates/primitives/separator", version = "0.1.0-alpha.1" }
leptix-accessible-icon = { path = "./crates/primitives/accessible-icon", version = "0.1.0-alpha.1" }
leptix-aspect-ratio = { path = "./crates/primitives/aspect-ratio", version = "0.1.0-alpha.1" }
leptix-progress = { path = "./crates/primitives/progress", version = "0.1.0-alpha.1" }
leptix-toggle = { path = "./crates/primitives/toggle", version = "0.1.0-alpha.1" }
leptix-switch = { path = "./crates/primitives/switch", version = "0.1.0-alpha.1" }
leptix-avatar = { path = "./crates/primitives/avatar", version = "0.1.0-alpha.1" }
leptix-checkbox = { path = "./crates/primitives/checkbox", version = "0.1.0-alpha.1" }
leptix-collapsible = { path = "./crates/primitives/collapsible", version = "0.1.0-alpha.1" }
leptix-toggle-group = { path = "./crates/primitives/toggle-group", version = "0.1.0-alpha.1" }
leptix-radio-group = { path = "./crates/primitives/radio-group", version = "0.1.0-alpha.1" }
leptix-tabs = { path = "./crates/primitives/tabs", version = "0.1.0-alpha.1" }
leptix-accordion = { path = "./crates/primitives/accordion", version = "0.1.0-alpha.1" }
leptix-slider = { path = "./crates/primitives/slider", version = "0.1.0-alpha.1" }
